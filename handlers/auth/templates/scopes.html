<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Requested access — NeoWorks</title>
    <link rel="stylesheet" href="/auth/static/neoworks.css" />
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 100 100" fill="none" aria-hidden="true">
          <circle cx="50" cy="50" r="40" stroke="currentColor" stroke-width="7" />
          <path d="M 81 27 C 73 51, 55 69, 26 74" stroke="currentColor" stroke-width="7" stroke-linecap="round" />
        </svg>
        <span>NeoWorks</span>
      </div>
      <h1>Requested access</h1>
      <p class="subtitle">
        <strong>{{.AppName}}</strong> is asking for the following permissions.
      </p>

      <ul class="scopes">
        {{range .Scopes}}
        <li>
          <svg class="check" width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 8L6.5 11.5L13 5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <div>
            {{.Name}}
            {{if .Description}}<span class="scope-desc">{{.Description}}</span>{{end}}
          </div>
        </li>
        {{end}}
      </ul>

      <form method="GET" action="/oauth/consent">
        <input type="hidden" name="login_challenge" value="{{.LoginChallenge}}" />
        <button type="submit">Continue</button>
      </form>
    </div>
  </body>
</html>
