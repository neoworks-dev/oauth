<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Choose an account — NeoWorks</title>
    <link rel="stylesheet" href="/auth/static/neoworks.css" />
  </head>
  <body>
    <div class="card">
      <div class="logo page-logo">
        <svg width="20" height="20" viewBox="0 0 100 100" fill="none" aria-hidden="true">
          <circle cx="50" cy="50" r="40" stroke="currentColor" stroke-width="7" />
          <path d="M 81 27 C 73 51, 55 69, 26 74" stroke="currentColor" stroke-width="7" stroke-linecap="round" />
        </svg>
        <span>NeoWorks</span>
      </div>
      <h1>Choose an account</h1>
      <p class="subtitle">
        {{if .AppName}}to continue to {{.AppName}}{{else}}to continue{{end}}
      </p>

      <ul class="account-list">
        {{range .Accounts}}
        <li>
          <form method="POST" action="/auth/select-account">
            <input type="hidden" name="login_challenge" value="{{$.LoginChallenge}}" />
            <input type="hidden" name="user_id" value="{{.UserID}}" />
            <button type="submit" class="account-row">
              <span class="avatar">{{.Initial}}</span>
              <span class="account-text">
                {{if .Name}}<span class="account-name">{{.Name}}</span>{{end}}
                <span class="account-email">{{.Email}}</span>
              </span>
            </button>
          </form>
        </li>
        {{end}}
        <li>
          <form method="POST" action="/auth/select-account">
            <input type="hidden" name="login_challenge" value="{{.LoginChallenge}}" />
            <button type="submit" name="action" value="add" class="account-row account-add">
              <span class="avatar" aria-hidden="true">+</span>
              <span class="account-text">
                <span class="account-name">Use another account</span>
              </span>
            </button>
          </form>
        </li>
      </ul>
    </div>
  </body>
</html>
