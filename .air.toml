# Hot reload for the oauth service. Used by process-compose in local dev.
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -buildvcs=false -o ./tmp/oauth ./cmd/oauth"
  bin = "./tmp/oauth"
  include_ext = ["go"]
  exclude_dir = ["tmp", "keys", "sql"]
  delay = 500
  stop_on_error = true

[misc]
  clean_on_exit = true
